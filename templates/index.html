<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Email Detector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1e1e2f 0%, #2d2d44 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px 30px; max-width: 650px; width: 100%; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); text-align: center; }
        h1 { color: #fff; font-size: 2.2rem; margin-bottom: 8px; }
        .subtitle { color: #a0a0b8; margin-bottom: 25px; }
        textarea { width: 100%; height: 160px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 16px; color: #fff; padding: 16px; font-size: 1rem; resize: none; outline: none; transition: 0.3s; }
        textarea:focus { border-color: #6c63ff; box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.2); }
        .btn { margin-top: 20px; background: #6c63ff; color: #fff; border: none; padding: 14px 40px; font-size: 1.1rem; border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.3s; box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108, 99, 255, 0.6); }
        #result-box { margin-top: 30px; padding: 18px; border-radius: 16px; display: none; font-weight: 600; font-size: 1.2rem; }
        #result-box.ham { background: rgba(0, 230, 118, 0.15); border: 1px solid #00e676; color: #69f0ae; display: block; }
        #result-box.spam { background: rgba(255, 23, 68, 0.15); border: 1px solid #ff1744; color: #ff5252; display: block; }
        .confidence { font-size: 0.9rem; font-weight: 400; margin-top: 6px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📧 Spam Detector</h1>
        <p class="subtitle">Paste an email below and I'll tell you if it's Spam or Ham in 1 second.</p>
        <textarea id="email-input" placeholder="Paste your email text here... e.g. 'Win a free iPhone now!'"></textarea>
        <button class="btn" onclick="checkEmail()">🔍 Check Email</button>
        <div id="result-box">
            <span id="result-text"></span>
            <div class="confidence" id="confidence-text"></div>
        </div>
    </div>

    <script>
        async function checkEmail() {
            const text = document.getElementById('email-input').value;
            const resultBox = document.getElementById('result-box');
            const resultText = document.getElementById('result-text');
            const confidenceText = document.getElementById('confidence-text');

            if (!text.trim()) { alert("Please paste some email text first!"); return; }

            resultBox.className = '';
            resultBox.style.display = 'none';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const data = await response.json();

                resultBox.style.display = 'block';
                if (data.prediction === 'Spam') {
                    resultBox.className = 'spam';
                    resultText.innerHTML = '🚨 SPAM DETECTED';
                } else {
                    resultBox.className = 'ham';
                    resultText.innerHTML = '✅ LEGITIMATE (HAM)';
                }
                confidenceText.innerHTML = `Confidence: ${data.confidence}%`;
            } catch (error) {
                alert("Error connecting to the server. Make sure Flask is running.");
            }
        }
    </script>
</body>
</html>
